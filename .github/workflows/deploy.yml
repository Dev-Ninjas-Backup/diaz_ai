name: CI/CD Docker Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3️⃣ Build and push Docker images
      - name: Build and push FastAPI image
        run: |
          docker build -t softvence/fastapi:latest ./ && \
          docker push softvence/fastapi:latest

      - name: Build and push Celery worker image
        run: |
          docker build -t softvence/celery_worker:latest ./ && \
          docker push softvence/celery_worker:latest

      - name: Build and push Celery beat image
        run: |
          docker build -t softvence/celery_beat:latest ./ && \
          docker push softvence/celery_beat:latest

      # 4️⃣ Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/jupitermarineAI    # Path to your docker-compose.yml on EC2
            sudo docker compose down --remove-orphans
            sudo docker compose pull
            sudo docker compose up -d
