name: CI/CD Docker Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build separate images
      - name: Build FastAPI image
        run: docker build -t softvence/fastapi:latest -f Dockerfile.fastapi .

      - name: Build Celery worker image
        run: docker build -t softvence/celery_worker:latest -f Dockerfile.worker .

      - name: Build Celery beat image
        run: docker build -t softvence/celery_beat:latest -f Dockerfile.beat .

      - name: Push all images
        run: |
          docker push softvence/fastapi:latest
          docker push softvence/celery_worker:latest
          docker push softvence/celery_beat:latest

      - name: Update known_hosts for EC2
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -R ${{ secrets.EC2_HOST }} || true
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/jupitermarineAI
            sudo docker-compose pull
            sudo docker-compose up -d --remove-orphans



