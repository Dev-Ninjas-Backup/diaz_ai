services:
  nginx:
    image: nginx:latest
    container_name: nginx_server
    ports:
      - "80:80"
    volumes:
      - ./reverse_proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - diaz_fastapi

  diaz_fastapi:
    image: root762/diaz_ai_app:latest
    env_file:
      - .env
    expose:
      - "8080"
    restart: always